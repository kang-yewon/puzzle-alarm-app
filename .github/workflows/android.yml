name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 1. project.zip 압축 해제
    - name: Unzip project
      run: |
        unzip project.zip
        mv project/* .
        rm -rf project project.zip

    # 2. 안드로이드 앱 빌드에 필수적인 리눅스 환경 세팅
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y iproute2 python3-pip build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev lld libffi-dev libssl-dev autoconf automake libtool pkg-config cmake modules-dev libasound2-dev openjdk-17-jdk unzip

    # 3. 파이썬 최신 표준 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 4. 순수 명령어로 빌도저 직접 설치 및 APK 굽기 (주소 에러 절대 없음!)
    - name: Build APK with Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv
        buildozer android debug

    # 5. 완성된 APK 파일 업로드 보관함으로 전송
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Alarm-App-APK
        path: bin/*.apk
