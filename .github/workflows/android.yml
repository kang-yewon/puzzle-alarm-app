name: Android APK Build
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Buildozer Action
        uses: ArtemSanya/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .
