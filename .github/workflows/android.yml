name: Android APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # project.zip 압축 해제
    - name: Unzip project
      run: |
        unzip project.zip
        mv project/* .
        rm -rf project project.zip

    # ⚠️ 이 부분을 모두 소문자(artemsanya)로 수정했습니다!
    - name: Buildozer Action
      uses: artemsanya/buildozer-action@v1
      with:
        command: buildozer android debug
        repository_root: .
